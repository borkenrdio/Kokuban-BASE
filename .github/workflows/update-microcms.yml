name: Update microCMS content

on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch: {}
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

concurrency:
  group: update-microcms-content
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.MICROCMS_UPDATE_TOKEN || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build content from microCMS
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.MICROCMS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
          COLUMNS_SERVICE_DOMAIN: ${{ secrets.COLUMNS_SERVICE_DOMAIN }}
          MICROCMS_COLUMNS_KEY: ${{ secrets.MICROCMS_COLUMNS_KEY }}
          INFORMATION_SERVICE_DOMAIN: ${{ secrets.INFORMATION_SERVICE_DOMAIN }}
          MICROCMS_INFORMATION_DOMAIN: ${{ secrets.MICROCMS_INFORMATION_DOMAIN }}
          MICROCMS_INFO_DOMAIN: ${{ secrets.MICROCMS_INFO_DOMAIN }}
          MICROCMS_INFORMATION_KEY: ${{ secrets.MICROCMS_INFORMATION_KEY }}
          INFORMATION_API_KEY: ${{ secrets.INFORMATION_API_KEY }}
          MICROCMS_INFO_KEY: ${{ secrets.MICROCMS_INFO_KEY }}
          INFORMATION_ENDPOINT: ${{ secrets.INFORMATION_ENDPOINT }}
        run: |
          set -euo pipefail

          ran_build=false

          if [[ -n "${INFORMATION_SERVICE_DOMAIN}${MICROCMS_INFORMATION_DOMAIN}${MICROCMS_INFO_DOMAIN}" && -n "${MICROCMS_INFORMATION_KEY}${INFORMATION_API_KEY}${MICROCMS_INFO_KEY}" ]]; then
            npm run build:information
            ran_build=true
          else
            echo "Skipping information build: information microCMS secrets are not set."
          fi

          if [[ -n "${COLUMNS_SERVICE_DOMAIN}" && -n "${MICROCMS_COLUMNS_KEY}" ]]; then
            MICROCMS_SERVICE_DOMAIN="${COLUMNS_SERVICE_DOMAIN}" MICROCMS_API_KEY="${MICROCMS_COLUMNS_KEY}" npm run build:columns
            ran_build=true
          elif [[ -n "${MICROCMS_SERVICE_DOMAIN}" && -n "${MICROCMS_API_KEY}" ]]; then
            npm run build:columns
            ran_build=true
          else
            echo "Skipping columns build: columns microCMS secrets are not set."
          fi

          if [[ "${ran_build}" != "true" ]]; then
            echo "No microCMS secrets were configured, so no content was built."
          fi

      - name: Commit generated content
        env:
          MICROCMS_UPDATE_TOKEN: ${{ secrets.MICROCMS_UPDATE_TOKEN }}
        run: |
          set -euo pipefail

          # 先にステージしてから差分判定する。
          # git diff --quiet だけだと追跡済みファイルの変更しか検知できず、
          # 新規生成ファイル（新しいお知らせ記事ページ等）だけの場合にコミットされない。
          git add -u
          git add article columns information team index.html sitemap.xml

          if git diff --cached --quiet; then
            echo "No generated content changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update microCMS content"

          if [[ -z "${MICROCMS_UPDATE_TOKEN}" ]]; then
            echo "MICROCMS_UPDATE_TOKEN is not set. The commit will be pushed with GITHUB_TOKEN."
            echo "If GitHub Pages does not redeploy after this workflow commits, add MICROCMS_UPDATE_TOKEN as a fine-grained PAT with contents:write."
          fi

          git push origin main
