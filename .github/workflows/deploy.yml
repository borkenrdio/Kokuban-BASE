name: Build and Deploy SSG Contents

on:
  repository_dispatch:
    types: [microcms-webhook]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run information JSON build
        env:
          INFORMATION_SERVICE_DOMAIN: ${{ secrets.INFORMATION_SERVICE_DOMAIN }}
          MICROCMS_INFORMATION_KEY: ${{ secrets.MICROCMS_INFORMATION_KEY }}
        run: npm run build:information

      - name: Run Columns SSG
        env:
          MICROCMS_SERVICE_DOMAIN: ${{ secrets.COLUMNS_SERVICE_DOMAIN }}
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_COLUMNS_KEY }}
        run: npm run build:columns

      - name: Security check - no leaked secrets in HTML
        run: |
          echo "Checking for leaked API keys and unreplaced placeholders..."
          if grep -rln "X-MICROCMS-API-KEY" --include="*.html" .; then
            echo "ERROR: API key references remain in HTML."
            exit 1
          fi
          if grep -rln "{{MICROCMS_API_KEY}}\|{{MICROCMS_SERVICE_DOMAIN}}" --include="*.html" .; then
            echo "ERROR: Unreplaced microCMS placeholders remain in HTML."
            exit 1
          fi
          echo "Security check passed."

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "Deploy: Build static pages (auto-generated)"
          exclude_assets: |
            .github/
            scripts/
            node_modules/
            package.json
            package-lock.json
            .gitignore
